name: frontend-dev-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_env:
        description: "Terraform deploy environment profile under camp-be/infra/terraform/envs."
        required: true
        default: dev
        type: string

env:
  AWS_REGION: ap-northeast-2
  BACKEND_REPO: jing-jung/camp-be
  TF_DIR: camp-be/infra/terraform
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: frontend-dev-deploy-main
  cancel-in-progress: false

jobs:
  deploy-frontend:
    name: Deploy dev frontend
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env || 'dev' }}
    timeout-minutes: 35
    env:
      TARGET_ENV: ${{ github.event.inputs.target_env || 'dev' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: ${{ env.BACKEND_REPO }}
          path: camp-be

      - name: Resolve deploy profile
        id: deploy-profile
        env:
          GITHUB_VARIABLES_JSON: ${{ toJson(vars) }}
        run: |
          python - <<'PY' >>"$GITHUB_OUTPUT"
          import json
          import os
          import re
          import sys

          target_env = os.environ["TARGET_ENV"]
          if not re.fullmatch(r"[a-z0-9][a-z0-9-]*", target_env):
              print(f"Invalid target_env: {target_env}", file=sys.stderr)
              sys.exit(1)
          if target_env != "dev" and not target_env.startswith("dev-"):
              print(
                  "frontend-dev-deploy only accepts dev or dev-* target_env values.",
                  file=sys.stderr,
              )
              sys.exit(1)

          variables = json.loads(os.environ["GITHUB_VARIABLES_JSON"])
          env_key = f"AWS_{target_env.upper().replace('-', '_')}_DEPLOY_ROLE_ARN"
          role_arn = variables.get(env_key)
          if not role_arn and target_env == "dev":
              role_arn = variables.get("AWS_DEV_DEPLOY_ROLE_ARN")
          if not role_arn:
              print(f"Missing GitHub variable {env_key}.", file=sys.stderr)
              sys.exit(1)

          tf_backend_config = f"backends/{target_env}.hcl"
          tf_backend_path = os.path.join(os.environ["TF_DIR"], tf_backend_config)
          if not os.path.isfile(tf_backend_path):
              print(f"Missing backend config: {tf_backend_path}", file=sys.stderr)
              sys.exit(1)

          print(f"tf_backend_config={tf_backend_config}")
          print(f"deploy_role_arn={role_arn}")
          PY

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.deploy-profile.outputs.deploy_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify deploy account matches Terraform backend
        env:
          DEPLOY_ROLE_ARN: ${{ steps.deploy-profile.outputs.deploy_role_arn }}
          TF_BACKEND_CONFIG: ${{ steps.deploy-profile.outputs.tf_backend_config }}
        run: camp-be/scripts/verify_deploy_account_matches_backend.sh

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Deploy hosted frontend
        env:
          TF_BACKEND_CONFIG: ${{ steps.deploy-profile.outputs.tf_backend_config }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          chmod +x scripts/deploy-hosted-frontend.sh
          ./scripts/deploy-hosted-frontend.sh
